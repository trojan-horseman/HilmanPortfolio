<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Hilman Portfolio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    color:white;
}

/* BACKGROUND */
.bg-gif{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}

.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.85));
    z-index:-1;
}

/* NAV */
nav{
    background:rgba(0,0,0,0.7);
    padding:15px;
}

nav ul{
    display:flex;
    justify-content:center;
    gap:30px;
    list-style:none;
}

nav a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

nav a:hover{
    color:yellow;
}

/* FORM CONTAINER */
.container{
    max-width:600px;
    margin:50px auto;
    background:rgba(0,0,0,0.5);
    padding:30px;
    border-radius:15px;
}

/* FORM STYLE */
form{
    display:flex;
    flex-direction:column;
    gap:15px;
}

input, select{
    padding:12px;
    border:none;
    border-radius:8px;
    outline:none;
}

button{
    padding:12px;
    border:none;
    border-radius:8px;
    background:yellow;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:gold;
}

/* ERROR MESSAGE */
.error{
    color:#ff4d4d;
    font-size:14px;
}

/* SUCCESS MESSAGE */
.success{
    color:#00ff88;
    text-align:center;
    margin-bottom:10px;
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<img src="images/3STX.gif" class="bg-gif">
<div class="overlay"></div>

<!-- NAV -->
<nav>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="game.html">Game</a></li>
    </ul>
</nav>

<!-- FORM -->
<div class="container">

<h2>Contact Me</h2>
<p id="successMsg" class="success"></p>

<form id="contactForm">

    <input type="text" id="name" placeholder="Full Name">
    <small class="error" id="nameError"></small>

    <input type="email" id="email" placeholder="Email">
    <small class="error" id="emailError"></small>

    <input type="password" id="password" placeholder="Password">
    <small class="error" id="passError"></small>

    <input type="date" id="dob">

    <select id="gender">
        <option value="">Select Gender</option>
        <option>Male</option>
        <option>Female</option>
    </select>
    <small class="error" id="genderError"></small>

    <input type="file">

    <label>
        <input type="checkbox" id="terms"> I agree to terms
    </label>
    <small class="error" id="termsError"></small>

    <button type="submit">Submit</button>

</form>

</div>

<script>
const form = document.getElementById("contactForm");

form.addEventListener("submit", function(e){
    e.preventDefault();

    // reset error
    document.querySelectorAll(".error").forEach(el => el.innerText = "");
    document.getElementById("successMsg").innerText = "";

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value.trim();
    let gender = document.getElementById("gender").value;
    let terms = document.getElementById("terms").checked;

    let valid = true;

    // NAME
    if(name === ""){
        document.getElementById("nameError").innerText = "Name is required";
        valid = false;
    }

    // EMAIL
    if(email === ""){
        document.getElementById("emailError").innerText = "Email is required";
        valid = false;
    } else if(!email.includes("@")){
        document.getElementById("emailError").innerText = "Invalid email format";
        valid = false;
    }

    // PASSWORD
    if(password.length < 6){
        document.getElementById("passError").innerText = "Password must be at least 6 characters";
        valid = false;
    }

    // GENDER
    if(gender === ""){
        document.getElementById("genderError").innerText = "Please select gender";
        valid = false;
    }

    // TERMS
    if(!terms){
        document.getElementById("termsError").innerText = "You must agree to terms";
        valid = false;
    }

    // SUCCESS
    if(valid){
        document.getElementById("successMsg").innerText = "Form submitted successfully!";
        form.reset();
    }

});
</script>

</body>
</html>
